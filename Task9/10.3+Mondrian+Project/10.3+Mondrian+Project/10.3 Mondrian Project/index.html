<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    .Example{
      display: grid;
      height: 748px;
      width: 748px;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 130px 155px 20px;
      background-color: black;
      gap: 8px;
    }
    .sample{
      background-color: white;
    }
    .one{
      background-color: red;
    }
    .two{
      background-color: #f0f1ec;
      grid-column: span 3;
    }
    .three{
      background-color:#f0f1ec ;
      grid-row: span 2;
    }
    .four{
      background-color: #f0f1ec;
      grid-column: span 2;
      grid-row: span 2;
    }
    .five{
      background-color: #004592;
    }
    .six{
      background-color: #f0f1ec;
      grid-row: span 2;
    }
    .eight{
      background-color:#F9D01E ;
    }
    .nine{
      background-color:#232629 ;
    }
    .twelve{
      background-color:#f0f1ec;
    }
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
  </style>
</head>

<body>
  <div class="Example">
    <div class="sample one"></div>
    <div class="sample two"></div>
    <div class="sample three"></div>
    <div class="sample four"></div>
    <div class="sample five"></div>
    <div class="sample six"></div>
    <div class="sample seven"></div>
    <div class="sample eight"></div>
    <div class="sample nine"></div>
    <div class="sample ten"></div>
    <div class="sample eleven"></div>
    <div class="sample twelve"></div>
    <div class="sample thirteen"></div>
    <div class="sample fourteen"></div>
    <div class="sample fifteen"></div>
    <div class="sample sixteen"></div>

    

  </div>

</body>

</html>
